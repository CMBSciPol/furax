[project]
site_name = "Furax documentation"
site_description = "A Framework for Unified and Robust data Analysis with JAX."
site_author = "Furax contributors"
site_url = "https://furax.readthedocs.io/en"
copyright = "&copy; 2024-2026 Furax contributors"
repo_url = "https://github.com/CMBSciPol/furax"
repo_name = "CMBSciPol/furax"
edit_uri = "edit/main/docs/"

# https://zensical.org/docs/setup/navigation/
nav = [
  { "Home" = "index.md" },
  { "User Guide" = [
      "user_guide/getting_started.md",
      "user_guide/data_structures.md",
      "user_guide/operators.md",
  ] },
  { "Examples" = [
      "examples/component_separation.md",
      "examples/mapmaking.md",
  ] },
  { "API reference" = [
      "api/furax.md",
      { "furax.core" = [
          "api/core/algebra.md",
          "api/core/composite.md",
          "api/core/structural.md",
          "api/core/special.md",
      ] },
      { "furax.obs" = [
          "api/obs/pointing.md",
          "api/obs/polarization.md",
          "api/obs/beam.md",
          "api/obs/seds.md",
          "api/obs/likelihoods.md",
          "api/obs/landscapes.md",
          "api/obs/stokes.md",
          "api/obs/atmosphere.md",
      ] },
      { "furax.mapmaking" = [
          "api/mapmaking/observation.md",
          "api/mapmaking/mapmaker.md",
          "api/mapmaking/config.md",
          "api/mapmaking/preconditioner.md",
      ] },
      { "Other subpackages" = [
          "api/math.md",
          "api/linalg.md",
          "api/io.md",
          "api/interfaces.md",
          "api/tree.md",
          "api/distributed.md",
          "api/exceptions.md",
      ] },
  ] },
  { "Development" = [
      "development/contributing.md",
      "development/changelog.md",
  ] },
]

# https://zensical.org/docs/authoring/math/
extra_javascript = [
    "javascripts/mathjax.js",
    "https://unpkg.com/mathjax@3/es5/tex-mml-chtml.js"
]

# Enable API reference documentation
# https://zensical.org/docs/setup/extensions/mkdocstrings/
[project.plugins.mkdocstrings.handlers.python]
inventories = [
    "https://docs.python.org/3/objects.inv",
    "https://numpy.org/doc/stable/objects.inv",
    "https://jax.readthedocs.io/en/latest/objects.inv",
    "https://healpy.readthedocs.io/en/latest/objects.inv",
]
paths = ["src"]

[project.plugins.mkdocstrings.handlers.python.options]
# Parse docstrings as Google style, rendering sections as lists (not tables).
docstring_style = "google"
docstring_section_style = "list"
# Keep source order.
members_order = "source"
# Cross-references: resolve [`Name`][] by scope, by dotted relative path, and in signatures.
relative_crossrefs = true
scoped_crossrefs = true
signature_crossrefs = true
# Show the real type inside Annotated[...] annotations.
unwrap_annotated = true
# Render a heading for the symbol requested directly by a `:::` block.
show_root_heading = true
# Render symbols with no docstring; document only public (non-_) names.
show_if_no_docstring = true
filters = "public"
# Drop the __init__ summary line (merged into the class).
docstring_options.ignore_init_summary = true
# Member summary tables at the top of each page.
summary = true
# Symbol-type tags in headings and the right-hand table of contents.
show_symbol_type_heading = true
show_symbol_type_toc = true

[project.markdown_extensions]
admonition = {}
pymdownx.details = {}
pymdownx.superfences = {}
pymdownx.highlight = { anchor_linenums = true, line_spans = "__span", pygments_lang_class = true }
pymdownx.inlinehilite = {}
pymdownx.snippets = {}
pymdownx.tabbed = { alternate_style = true }
footnotes = {}
pymdownx.caret = {}
pymdownx.keys = {}
pymdownx.mark = {}
pymdownx.tilde = {}
pymdownx.arithmatex = { generic = true }
pymdownx.magiclink = { repo_url_shorthand = true, user = "CMBSciPol", repo = "furax" }
pymdownx.emoji = {}
abbr = {}
attr_list = {}
def_list = {}
pymdownx.tasklist = { custom_checkbox = true }

[project.theme]
language = "en"
icon.repo = "fontawesome/brands/github"

features = [
    "announce.dismiss",
    "content.action.edit",
    "content.action.view",
    "content.code.annotate",
    "content.code.copy",
    "content.footnote.tooltips",
    "content.tabs.link",
    "content.tooltips",
    "navigation.footer",
    "navigation.indexes",
    "navigation.instant",
    "navigation.instant.progress",
    "navigation.path",
    "navigation.sections",
    "navigation.tabs",
    "navigation.tabs.sticky",
    "navigation.top",
    "navigation.tracking",
    "search.highlight",
    "search.share",
    "search.suggest",
    "toc.follow",
]

palette = [
  {
    media = "(prefers-color-scheme)",
    toggle = { icon = "lucide/sun-moon", name = "Switch to light mode" }
  },
  {
    media = "(prefers-color-scheme: light)",
    scheme = "default",
    toggle = { icon = "lucide/sun", name = "Switch to dark mode" }
  },
  {
    media = "(prefers-color-scheme: dark)",
    scheme = "slate",
    toggle = { icon = "lucide/moon", name = "Switch to system preference" }
  },
]
